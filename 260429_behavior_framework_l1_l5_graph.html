      --edge: #86a4ca;

    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;

      background: linear-gradient(135deg, #ffffff 0%, var(--bg) 48%, #e8f1fb 100%);
    }
    .wrap { min-height: 100vh; padding: 14px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(23, 32, 51, 0.08);
      overflow: hidden;
    }
    .hd {
      margin: 0;
      padding: 12px 14px;
      font-size: 18px;
      line-height: 1.35;
      border-bottom: 1px solid var(--line);
      background: #f9fbff;
    }
    .tip {
      padding: 8px 14px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      background: #fcfdff;
    }
    .body-grid {
      display: grid;
      grid-template-columns: minmax(520px, 1fr) 8px minmax(260px, 420px);
      gap: 8px;
      padding: 10px 12px 14px;
    }
    .splitter {
      width: 8px;
      border-radius: 999px;
      background: linear-gradient(180deg, #dbe8f7, #a9c4e2, #dbe8f7);
      cursor: col-resize;
      position: relative;
    }
    .splitter::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 2px;
      height: 46px;
      border-left: 1px solid rgba(47, 93, 145, .55);
      border-right: 1px solid rgba(47, 93, 145, .55);
      transform: translate(-50%, -50%);
    }
    .body-grid.resizing,
    .body-grid.resizing * {
      cursor: col-resize !important;
      user-select: none;
    }
    .view {
      padding: 0;
      overflow: auto;
      max-height: calc(100vh - 112px);
    }
    .detail {
      border: 1px solid #d8e4f2;
      border-radius: 10px;
      background: #f8fbff;
      padding: 12px;
      max-height: calc(100vh - 112px);
      overflow: auto;
    }
    .detail h2 {
      margin: 0 0 8px;
      font-size: 15px;
      color: #1d3f6e;
    }
    .detail p {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }
    .detail ol {
      margin: 0;
      padding-left: 20px;
      font-size: 12px;
      line-height: 1.55;
      color: #193858;
    }
    .detail li { margin: 3px 0; }
    .svg {
      display: block;
      width: max-content;
      min-width: 100%;
      height: auto;
      background: #ffffff;
      border: 1px solid #dbe6f3;
      border-radius: 10px;
    }
    .col-title {
      font-size: 13px;
      fill: #244565;
      font-weight: 800;
    }
    .node {
      fill: #f8fbff;
      stroke: #a9bdd8;
      stroke-width: 1;
      rx: 6;
      ry: 6;
      cursor: pointer;
      transition: opacity .15s ease, fill .15s ease, stroke .15s ease, stroke-width .15s ease;
    }
    .node-text {
      font-size: 10.5px;
      fill: #172d4a;
      dominant-baseline: middle;
      pointer-events: none;
    }
    .edge {
      stroke: var(--edge);
      stroke-width: .35;
      fill: none;
      opacity: .42;
      cursor: pointer;
      transition: opacity .15s ease, stroke .15s ease, stroke-width .15s ease;
    }
    .dim { opacity: .08 !important; }
    .active-node { stroke: var(--active); stroke-width: 2; opacity: 1 !important; }
    .active-edge { stroke: var(--active); stroke-width: .9; opacity: .9 !important; }
  </style>
</head>

    Object.entries(projectToBehaviors).forEach(([p, bs]) => addMany(p, bs));

    const behaviorToActions = {
      L4_01: ["L5_001", "L5_002", "L5_003", "L5_004", "L5_005", "L5_006", "L5_007", "L5_008", "L5_009", "L5_010", "L5_011", "L5_012", "L5_013", "L5_014", "L5_015", "L5_016", "L5_017", "L5_018", "L5_019", "L5_020", "L5_021", "L5_022"],
      L4_02: ["L5_023", "L5_024", "L5_025", "L5_026", "L5_027"],
      L4_03: ["L5_028", "L5_029", "L5_030"],
      L4_04: ["L5_031", "L5_032", "L5_033", "L5_034", "L5_035"],
      L4_05: ["L5_036", "L5_037", "L5_038", "L5_039"],
      L4_06: ["L5_040", "L5_041", "L5_042"],
      L4_07: ["L5_043", "L5_044", "L5_045", "L5_046", "L5_047", "L5_048", "L5_049", "L5_050", "L5_051", "L5_052", "L5_053", "L5_054", "L5_055", "L5_056", "L5_057", "L5_058", "L5_059", "L5_060"],
      L4_08: ["L5_061", "L5_062", "L5_063", "L5_064", "L5_065", "L5_066", "L5_067", "L5_068", "L5_069", "L5_070", "L5_071", "L5_072", "L5_073", "L5_074", "L5_075", "L5_076"],
      L4_09: ["L5_077", "L5_078", "L5_079", "L5_080", "L5_081", "L5_082", "L5_083", "L5_084"],
      L4_10: ["L5_085", "L5_086", "L5_087", "L5_088", "L5_089", "L5_090"],
      L4_11: ["L5_091", "L5_092", "L5_093", "L5_094", "L5_095", "L5_096", "L5_097", "L5_098", "L5_099", "L5_100", "L5_101", "L5_102", "L5_103", "L5_104", "L5_105"],
      L4_12: ["L5_106", "L5_107", "L5_108", "L5_109", "L5_110", "L5_111", "L5_112", "L5_113", "L5_114", "L5_115", "L5_116", "L5_117", "L5_118", "L5_119", "L5_120", "L5_121", "L5_122"]
    };
    const nodeMap = {};
    [...levels, "L5"].forEach(l => {
      nodeMap[l] = {};
      data.nodes[l].forEach(([id, name]) => nodeMap[l][id] = name);
    });

    const levelOf = (id) => id.split("_")[0];
    const colors = {
      L1: { fill: "#edf5ff", stroke: "#7ea4d8", line: "#7ea4d8" },
      L2: { fill: "#e8f2ff", stroke: "#3f7fc7", line: "#3f7fc7" },
      L3: { fill: "#f4f8ff", stroke: "#8aaed9", line: "#8aaed9" },
      L4: { fill: "#eaf3ff", stroke: "#5b8fc8", line: "#5b8fc8" }
    };
    const l2Colors = {
      L2_01: { fill: "#dcecff", stroke: "#4f86c6", line: "#4f86c6" },
      L2_02: { fill: "#dff7f5", stroke: "#4aa7a0", line: "#4aa7a0" },
      L2_03: { fill: "#fff0d8", stroke: "#d3933d", line: "#d3933d" },
      L2_04: { fill: "#e8e5ff", stroke: "#7f73c9", line: "#7f73c9" },
      L2_05: { fill: "#e4f5df", stroke: "#6aa85c", line: "#6aa85c" },
      L2_06: { fill: "#ffe4eb", stroke: "#c86f8a", line: "#c86f8a" }
    };

    function esc(x) {
      return String(x).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function uniqEdges(edges) {
      const seen = new Set();
      return edges.filter(([a, b]) => {
        const k = `${a}|${b}`;
        if (seen.has(k)) return false;
        seen.add(k);
        return true;
      });
    }

    let focus = null;

    function render() {
      const view = document.getElementById("graphView");
      const ids = {};
      levels.forEach(l => ids[l] = data.nodes[l].map(([id]) => id));
      const edges = uniqEdges(data.edges);
      const nodeW = 238;
      const nodeH = 22;
      const gapY = 7;
      const topPad = 40;
      const sidePad = 16;
      const colGap = 56;
      const maxCount = Math.max(...levels.map(l => ids[l].length));
      const svgH = topPad + maxCount * (nodeH + gapY) + 22;
      const x = {};
      levels.forEach((l, i) => x[l] = sidePad + i * (nodeW + colGap));
      const svgW = x.L4 + nodeW + sidePad;
      const pos = {};
      levels.forEach(l => {
        pos[l] = {};
        ids[l].forEach((id, i) => pos[l][id] = { x: x[l], y: topPad + i * (nodeH + gapY) });
      });

      const key = id => `${levelOf(id)}:${id}`;
      const neighbors = {};
      edges.forEach(([a, b]) => {
        const ka = key(a), kb = key(b);
        neighbors[ka] = neighbors[ka] || new Set();
        neighbors[kb] = neighbors[kb] || new Set();
        neighbors[ka].add(kb);
        neighbors[kb].add(ka);
      });

      const isActiveNode = id => {
        if (!focus) return true;
        if (focus.type === "node") {
          const k = key(id);
          const fk = key(focus.id);
          return k === fk || neighbors[fk]?.has(k);
        }
        if (focus.type === "edge") return id === focus.from || id === focus.to;
        return true;
      };

      const isActiveEdge = ([a, b]) => {
        if (!focus) return true;
        if (focus.type === "node") return a === focus.id || b === focus.id;
        if (focus.type === "edge") return a === focus.from && b === focus.to;
        return true;
      };

      const titles = [
        ["L1", "L1 Landuse / 用地"],
        ["L2", "L2 Activities / 活动"],
        ["L3", "L3 Project / 企划"],
        ["L4", "L4 Behaviors / 行为"]
      ].map(([l, t]) => `<text class="col-title" x="${x[l]}" y="24">${esc(t)}</text>`).join("");

      const edgeSvg = edges.map(([from, to]) => {
        const lf = levelOf(from), lt = levelOf(to);
        const p1 = pos[lf][from], p2 = pos[lt][to];
        if (!p1 || !p2) return "";
        const x1 = p1.x + nodeW, y1 = p1.y + nodeH / 2;
        const x2 = p2.x, y2 = p2.y + nodeH / 2;
        const on = isActiveEdge([from, to]);
        const cls = `edge${focus ? (on ? " active-edge" : " dim") : ""}`;
        const stroke = lf === "L2" ? (l2Colors[from]?.line || colors.L2.line) : (colors[lf]?.line || "#86a4ca");
        return `<path class="${cls}" style="stroke:${stroke}" data-kind="edge" data-from="${from}" data-to="${to}" d="M ${x1} ${y1} C ${x1 + 24} ${y1}, ${x2 - 24} ${y2}, ${x2} ${y2}" />`;
      }).join("");

      const nodeSvg = levels.map(l => ids[l].map(id => {
        const p = pos[l][id];
        const on = isActiveNode(id);
        const cls = `node${focus ? (on ? " active-node" : " dim") : ""}`;
        const c = l === "L2" ? (l2Colors[id] || colors.L2) : colors[l];
        const label = `${id} ${nodeMap[l][id]}`;
        return `<g>
          <rect class="${cls}" style="fill:${c.fill};stroke:${c.stroke}" data-kind="node" data-id="${id}" x="${p.x}" y="${p.y}" width="${nodeW}" height="${nodeH}"></rect>
          <text class="node-text" x="${p.x + 7}" y="${p.y + nodeH / 2}">${esc(label)}</text>
        </g>`;
      }).join("")).join("");

      view.innerHTML = `<svg class="svg" width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="L1-L4 behavior framework network">${titles}${edgeSvg}${nodeSvg}</svg>`;
      renderDetail();
    }

    function renderDetail() {
      const panel = document.getElementById("detailPanel");
      const selected = focus?.type === "node" && levelOf(focus.id) === "L4" ? focus.id : null;
      if (!selected) {
        panel.innerHTML = `<h2>L5 Actions / 动作明细</h2><p>点击左侧 L4 Behaviors 节点，查看对应的 L5 具体动作。</p>`;
        return;
      }
      const actionIds = behaviorToActions[selected] || [];
      const items = actionIds.map(id => `<li>${esc(id)} ${esc(nodeMap.L5[id] || "(未命名)")}</li>`).join("");
      panel.innerHTML = `<h2>${esc(selected)} ${esc(nodeMap.L4[selected])}</h2><p>对应 L5 Actions / 动作明细（${actionIds.length}）</p><ol>${items}</ol>`;
    }

    document.getElementById("graphView").addEventListener("click", (ev) => {
      const t = ev.target;
      const kind = t?.dataset?.kind;
      if (!kind) {
        focus = null;
        render();
        return;
      }
      if (kind === "node") {
        const id = t.dataset.id;
        focus = focus && focus.type === "node" && focus.id === id ? null : { type: "node", id };
      }
      if (kind === "edge") {
        const from = t.dataset.from;
        const to = t.dataset.to;
        focus = focus && focus.type === "edge" && focus.from === from && focus.to === to ? null : { type: "edge", from, to };
      }
      render();
    });

    const grid = document.querySelector(".body-grid");
    const splitter = document.getElementById("splitter");
    const setColumns = (leftPx) => {
      const rect = grid.getBoundingClientRect();
      const splitterW = splitter.offsetWidth || 8;
      const gapTotal = 16;
      const minLeft = 520;
      const minRight = 260;
      const maxLeft = Math.max(minLeft, rect.width - splitterW - gapTotal - minRight);
      const left = Math.min(Math.max(leftPx, minLeft), maxLeft);
      const right = Math.max(minRight, rect.width - splitterW - gapTotal - left);
      grid.style.gridTemplateColumns = `${left}px ${splitterW}px ${right}px`;
    };
    splitter.addEventListener("pointerdown", (ev) => {
      ev.preventDefault();
      splitter.setPointerCapture(ev.pointerId);
      grid.classList.add("resizing");
    });
    splitter.addEventListener("pointermove", (ev) => {
      if (!grid.classList.contains("resizing")) return;
      const rect = grid.getBoundingClientRect();
      setColumns(ev.clientX - rect.left);
    });
    const stopResize = (ev) => {
      if (splitter.hasPointerCapture?.(ev.pointerId)) splitter.releasePointerCapture(ev.pointerId);
      grid.classList.remove("resizing");
    };
    splitter.addEventListener("pointerup", stopResize);
    splitter.addEventListener("pointercancel", stopResize);

    render();
  </script>
</body>
</html>
