<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L1-L3 全景关系图</title>
  <style>
    :root {
      --bg: #f4f7fc;
      --card: #fff;
      --line: #d9e2ef;
      --text: #1e293b;
      --sub: #5b6b7f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at left top, #ffffff 0%, var(--bg) 58%, #e8eef9 100%);
    }
    .wrap {
      min-height: 100vh;
      padding: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(18, 38, 63, 0.08);
      overflow: hidden;
    }
    .hd {
      margin: 0;
      padding: 12px 14px;
      font-size: 18px;
      border-bottom: 1px solid var(--line);
      background: #f8fbff;
    }
    .tip {
      padding: 8px 14px;
      border-bottom: 1px solid var(--line);
      color: var(--sub);
      font-size: 12px;
      line-height: 1.55;
      background: #fcfdff;
    }
    .view {
      padding: 10px 12px 14px;
      overflow: auto;
    }
    .full-svg {
      display: block;
      width: 100%;
      height: auto;
      background: #ffffff;
      border: 1px solid #e2e8f2;
      border-radius: 10px;
    }
    .full-col-title {
      font-size: 12px;
      fill: #4b617f;
      font-weight: 700;
    }
    .full-node {
      fill: #f7faff;
      stroke: #b8c7de;
      stroke-width: 1;
      rx: 6;
      ry: 6;
      cursor: pointer;
      transition: opacity .15s ease, fill .15s ease, stroke .15s ease;
    }
    .full-edge {
      stroke: #8ca3c4;
      stroke-width: 1.1;
      fill: none;
      opacity: 0.8;
      cursor: pointer;
      transition: opacity .15s ease, stroke .15s ease, stroke-width .15s ease;
    }
    .full-text {
      font-size: 11px;
      fill: #1f3553;
      dominant-baseline: middle;
      pointer-events: none;
    }
    .full-active-node {
      stroke-width: 1.8;
      opacity: 1 !important;
    }
    .full-active-edge {
      stroke-width: 1.8;
      opacity: 1 !important;
    }
    .full-dim {
      opacity: 0.12 !important;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h2 class="hd">L1 ↔ L2 ↔ L3 全景关系图</h2>
      <div class="tip">点击节点/连线可聚焦，其他部分变暗；点击空白恢复全量显示。</div>
      <div id="fullRelationView" class="view"></div>
    </section>
  </div>

  <script>
const defaultSeed = {
      l1: [
        ["L1_01", "公园绿地"],
        ["L1_02", "商业服务"],
        ["L1_03", "交通用地"],
        ["L1_04", "公共服务空间"]
      ],
      l2: [
        ["L2_01", "休憩（Resting Activity）"],
        ["L2_02", "社交（Social Activity）"],
        ["L2_03", "休闲（Recreational Activity）"],
        ["L2_04", "通勤（Mobility Activity）"],
        ["L2_05", "消费（Consumption Activity）"],
        ["L2_06", "运动（Physical Activity）"]
      ],
      l3: [
        ["L3_01", "移动行为（Locomotion）"],
        ["L3_02", "停留行为（Stationary）"],
        ["L3_03", "速度调节（Speed Regulation）"],
        ["L3_04", "姿态调节（Postural Adjustment）"],
        ["L3_05", "空间转换（Spatial Transition）"],
        ["L3_06", "健身运动（Physical Exertion）"],
        ["L3_07", "执行任务（Task Execution）"],
        ["L3_08", "物体操作（Object Manipulation）"],
        ["L3_09", "环境互动（Environmental Engagement）"],
        ["L3_10", "设备使用（Device-mediated Interaction）"],
        ["L3_11", "人际协作（Interpersonal Interaction）"],
        ["L3_12", "群体互动（Group Dynamics）"]
      ],
      hierarchy: [
        ["L1_01", "L2_01", "L3_02"], ["L1_01", "L2_01", "L3_04"], ["L1_01", "L2_01", "L3_09"], ["L1_01", "L2_01", "L3_10"],
        ["L1_01", "L2_02", "L3_11"], ["L1_01", "L2_02", "L3_12"], ["L1_01", "L2_02", "L3_08"],
        ["L1_01", "L2_03", "L3_06"], ["L1_01", "L2_03", "L3_09"], ["L1_01", "L2_03", "L3_10"], ["L1_01", "L2_03", "L3_11"], ["L1_01", "L2_03", "L3_12"],
        ["L1_01", "L2_04", "L3_01"], ["L1_01", "L2_04", "L3_03"], ["L1_01", "L2_04", "L3_05"],
        ["L1_01", "L2_06", "L3_01"], ["L1_01", "L2_06", "L3_03"], ["L1_01", "L2_06", "L3_04"], ["L1_01", "L2_06", "L3_06"],

        ["L1_02", "L2_01", "L3_02"], ["L1_02", "L2_01", "L3_04"], ["L1_02", "L2_01", "L3_09"], ["L1_02", "L2_01", "L3_10"],
        ["L1_02", "L2_02", "L3_11"], ["L1_02", "L2_02", "L3_12"], ["L1_02", "L2_02", "L3_08"],
        ["L1_02", "L2_03", "L3_06"], ["L1_02", "L2_03", "L3_09"], ["L1_02", "L2_03", "L3_10"], ["L1_02", "L2_03", "L3_11"], ["L1_02", "L2_03", "L3_12"],
        ["L1_02", "L2_04", "L3_01"], ["L1_02", "L2_04", "L3_03"], ["L1_02", "L2_04", "L3_05"],
        ["L1_02", "L2_05", "L3_05"], ["L1_02", "L2_05", "L3_07"], ["L1_02", "L2_05", "L3_08"], ["L1_02", "L2_05", "L3_10"], ["L1_02", "L2_05", "L3_11"],

        ["L1_03", "L2_01", "L3_02"], ["L1_03", "L2_01", "L3_04"],
        ["L1_03", "L2_02", "L3_11"], ["L1_03", "L2_02", "L3_12"],
        ["L1_03", "L2_04", "L3_01"], ["L1_03", "L2_04", "L3_03"], ["L1_03", "L2_04", "L3_05"],

        ["L1_04", "L2_01", "L3_02"], ["L1_04", "L2_01", "L3_04"], ["L1_04", "L2_01", "L3_09"], ["L1_04", "L2_01", "L3_10"],
        ["L1_04", "L2_02", "L3_11"], ["L1_04", "L2_02", "L3_12"], ["L1_04", "L2_02", "L3_08"],
        ["L1_04", "L2_03", "L3_06"], ["L1_04", "L2_03", "L3_09"], ["L1_04", "L2_03", "L3_10"], ["L1_04", "L2_03", "L3_11"], ["L1_04", "L2_03", "L3_12"],
        ["L1_04", "L2_04", "L3_01"], ["L1_04", "L2_04", "L3_03"], ["L1_04", "L2_04", "L3_05"],
        ["L1_04", "L2_05", "L3_05"], ["L1_04", "L2_05", "L3_07"], ["L1_04", "L2_05", "L3_08"], ["L1_04", "L2_05", "L3_10"], ["L1_04", "L2_05", "L3_11"]
      ],
      l3Actions: {
        "L3_01": ["步行", "跑步", "爬行", "跳跃", "游泳", "攀爬", "骑自行车", "滑滑板车", "滑滑板", "骑车", "驾驶汽车", "划船", "驾驶帆船", "上楼梯", "下楼梯", "穿行", "车辆行驶", "车辆启动", "车辆停止", "车辆左转", "车辆右转", "车辆掉头"],
        "L3_02": ["站立", "坐", "躺", "等待", "排队"],
        "L3_03": ["让出路径反应", "加速反应", "减速反应"],
        "L3_04": ["跌倒", "起身", "蹲/跪", "弯腰", "穿衣"],
        "L3_05": ["进入", "离开", "车辆接人", "车辆送人下车"],
        "L3_06": ["练习武术", "跳舞", "演奏乐器"],
        "L3_07": ["使用工具", "旋转工具", "按压", "砍/劈", "切割", "挖掘", "铲运", "搅拌", "取出物品", "粉刷", "烹饪", "进食", "饮水", "阅读", "书写/打字", "装载货物", "卸载货物", "钓鱼"],
        "L3_08": ["手持物体", "接住物体", "拿起/举起物体", "放下物体", "打开", "关闭", "拉动物体", "推动物体", "触摸/操作物体", "指向物体", "投掷", "击打物体", "踢物体", "开关门", "把物品递给他人", "从他人处接过物品"],
        "L3_09": ["与宠物玩耍", "拍照", "吸烟", "道路事故", "偏离步道步行异常", "滑板者异常", "小推车异常", "轮椅异常"],
        "L3_10": ["接电话", "打电话", "发短信/看手机", "使用电脑", "看屏幕", "听音频"],
        "L3_11": ["与人交谈", "听他人说话", "看向他人/目标", "对个人或群体唱歌", "点头", "致意手势", "让行手势", "优先通行手势", "握手", "拥抱", "拍手", "挥手/打招呼", "亲吻", "抱起他人", "与儿童玩耍"],
        "L3_12": ["抓住他人", "推他人", "踢他人", "击打/打斗他人", "虐待", "逮捕", "纵火", "袭击", "入室盗窃", "爆炸", "抢劫", "枪击", "店内盗窃", "偷窃", "破坏公物", "骚乱", "玩棋盘游戏/打麻将"]
      }
    };

    function uniqBy(items, keyFn) {
      const map = new Map();
      items.forEach(i => map.set(keyFn(i), i));
      return Array.from(map.values());
    }

    function toState(seed) {
      const s = {
        nodes: { L1: {}, L2: {}, L3: {}, L4: {} },
        hierarchy: [],
        edges: []
      };
      seed.l1.forEach(([id, name]) => s.nodes.L1[id] = name);
      seed.l2.forEach(([id, name]) => s.nodes.L2[id] = name);
      seed.l3.forEach(([id, name]) => s.nodes.L3[id] = name);
      seed.hierarchy.forEach(([l1, l2, l3]) => s.hierarchy.push({ l1, l2, l3 }));
      return s;
    }

    const state = toState(defaultSeed);
    const fullRelationView = document.getElementById('fullRelationView');
    let fullRelationFocus = null;
    const l2Morandi = {
      L2_01: { fill: '#d6f0cf', stroke: '#71b36a', line: '#71b36a' }, // fresh green
      L2_02: { fill: '#f5d3e6', stroke: '#c06c9d', line: '#c06c9d' }, // rose pink
      L2_03: { fill: '#ffe1c6', stroke: '#d58b4b', line: '#d58b4b' }, // apricot
      L2_04: { fill: '#d5e7ff', stroke: '#5f8fcf', line: '#5f8fcf' }, // sky blue
      L2_05: { fill: '#fff1b8', stroke: '#c7a63b', line: '#c7a63b' }, // warm yellow
      L2_06: { fill: '#c9f1ea', stroke: '#4aa497', line: '#4aa497' }  // aqua teal
    };

    function esc(x) {
      return String(x)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function renderFullRelationGraph(s) {
      const l1Ids = Object.keys(s.nodes.L1).sort();
      const l2Ids = Object.keys(s.nodes.L2).sort();
      const l3Ids = Object.keys(s.nodes.L3).sort();

      const e12 = uniqBy(s.hierarchy.map(h => ({ fromL: 'L1', from: h.l1, toL: 'L2', to: h.l2 })), e => `${e.from}|${e.to}`);
      const e23 = uniqBy(s.hierarchy.map(h => ({ fromL: 'L2', from: h.l2, toL: 'L3', to: h.l3 })), e => `${e.from}|${e.to}`);
      const allEdges = [...e12, ...e23];

      const nodeW = 290;
      const nodeH = 24;
      const gapY = 8;
      const topPad = 36;
      const sidePad = 18;
      const colGap = 72;

      const maxCount = Math.max(l1Ids.length, l2Ids.length, l3Ids.length);
      const svgH = topPad + 18 + maxCount * nodeH + Math.max(0, maxCount - 1) * gapY + 20;

      const xL1 = sidePad;
      const xL2 = xL1 + nodeW + colGap;
      const xL3 = xL2 + nodeW + colGap;
      const svgW = xL3 + nodeW + sidePad;

      const yOf = (idx) => topPad + idx * (nodeH + gapY);
      const pos = { L1: {}, L2: {}, L3: {} };
      l1Ids.forEach((id, i) => { pos.L1[id] = { x: xL1, y: yOf(i) }; });
      l2Ids.forEach((id, i) => { pos.L2[id] = { x: xL2, y: yOf(i) }; });
      l3Ids.forEach((id, i) => { pos.L3[id] = { x: xL3, y: yOf(i) }; });

      const keyNode = (l, id) => `${l}:${id}`;
      const neighbors = {};
      allEdges.forEach(e => {
        const a = keyNode(e.fromL, e.from);
        const b = keyNode(e.toL, e.to);
        neighbors[a] = neighbors[a] || new Set();
        neighbors[b] = neighbors[b] || new Set();
        neighbors[a].add(b);
        neighbors[b].add(a);
      });

      const activeNode = (l, id) => {
        if (!fullRelationFocus) return true;
        if (fullRelationFocus.type === 'node') {
          const k = keyNode(l, id);
          const fk = keyNode(fullRelationFocus.level, fullRelationFocus.id);
          if (k === fk) return true;
          return neighbors[fk]?.has(k) || false;
        }
        if (fullRelationFocus.type === 'edge') {
          return (l === fullRelationFocus.fromL && id === fullRelationFocus.from) ||
                 (l === fullRelationFocus.toL && id === fullRelationFocus.to);
        }
        return true;
      };

      const activeEdge = (e) => {
        if (!fullRelationFocus) return true;
        if (fullRelationFocus.type === 'node') {
          return (e.fromL === fullRelationFocus.level && e.from === fullRelationFocus.id) ||
                 (e.toL === fullRelationFocus.level && e.to === fullRelationFocus.id);
        }
        if (fullRelationFocus.type === 'edge') {
          return e.fromL === fullRelationFocus.fromL && e.from === fullRelationFocus.from &&
                 e.toL === fullRelationFocus.toL && e.to === fullRelationFocus.to;
        }
        return true;
      };

      const nodeLabel = (level, id) => `${id} ${s.nodes[level][id] || '(未命名)'}`;
      const colTitle = (x, t) => `<text class="full-col-title" x="${x}" y="20">${esc(t)}</text>`;

      const drawNodes = (level, ids, x) => ids.map(id => {
        const p = pos[level][id];
        const on = activeNode(level, id);
        const cls = `full-node${fullRelationFocus ? (on ? ' full-active-node' : ' full-dim') : ''}`;
        const c = level === 'L2'
          ? (l2Morandi[id] || { fill: '#f7faff', stroke: '#b8c7de' })
          : { fill: '#f7faff', stroke: '#b8c7de' };
        const style = `fill:${c.fill};stroke:${c.stroke};`;
        return `<g>
          <rect class="${cls}" style="${style}" data-kind="full-node" data-level="${level}" data-id="${esc(id)}" x="${x}" y="${p.y}" width="${nodeW}" height="${nodeH}"></rect>
          <text class="full-text" x="${x + 8}" y="${p.y + nodeH / 2}">${esc(nodeLabel(level, id))}</text>
        </g>`;
      }).join('');

      const drawEdges = allEdges.map(e => {
        const p1 = pos[e.fromL][e.from];
        const p2 = pos[e.toL][e.to];
        const x1 = p1.x + nodeW;
        const y1 = p1.y + nodeH / 2;
        const x2 = p2.x;
        const y2 = p2.y + nodeH / 2;
        const cx1 = x1 + 28;
        const cx2 = x2 - 28;
        const ae = activeEdge(e);
        const cls = `full-edge${fullRelationFocus ? (ae ? ' full-active-edge' : ' full-dim') : ''}`;
        const l2id = e.fromL === 'L2' ? e.from : e.to;
        const c = l2Morandi[l2id]?.line || '#8ca3c4';
        return `<path class="${cls}" style="stroke:${c};" data-kind="full-edge" data-l2="${esc(l2id)}" data-froml="${e.fromL}" data-from="${esc(e.from)}" data-tol="${e.toL}" data-to="${esc(e.to)}" d="M ${x1} ${y1} C ${cx1} ${y1}, ${cx2} ${y2}, ${x2} ${y2}" />`;
      }).join('');

      return `
        <svg class="full-svg" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="L1 to L3 full relation graph">
          ${colTitle(xL1, 'L1')}
          ${colTitle(xL2, 'L2')}
          ${colTitle(xL3, 'L3')}
          ${drawEdges}
          ${drawNodes('L1', l1Ids, xL1)}
          ${drawNodes('L2', l2Ids, xL2)}
          ${drawNodes('L3', l3Ids, xL3)}
        </svg>
      `;
    }

    function rerender() {
      fullRelationView.innerHTML = renderFullRelationGraph(state);
    }

    fullRelationView.addEventListener('click', (ev) => {
      const t = ev.target;
      const kind = t?.dataset?.kind;
      if (!kind) {
        fullRelationFocus = null;
        rerender();
        return;
      }
      if (kind === 'full-node') {
        const level = t.dataset.level;
        const id = t.dataset.id;
        fullRelationFocus = fullRelationFocus && fullRelationFocus.type === 'node' &&
          fullRelationFocus.level === level && fullRelationFocus.id === id
          ? null : { type: 'node', level, id };
      } else if (kind === 'full-edge') {
        const fromL = t.dataset.froml;
        const from = t.dataset.from;
        const toL = t.dataset.tol;
        const to = t.dataset.to;
        fullRelationFocus = fullRelationFocus && fullRelationFocus.type === 'edge' &&
          fullRelationFocus.fromL === fromL && fullRelationFocus.from === from &&
          fullRelationFocus.toL === toL && fullRelationFocus.to === to
          ? null : { type: 'edge', fromL, from, toL, to };
      } else {
        fullRelationFocus = null;
      }
      rerender();
    });

    rerender();
  </script>
</body>
</html>
