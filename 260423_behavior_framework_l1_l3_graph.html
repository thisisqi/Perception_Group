      --text: #1e293b;
      --sub: #5b6b7f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at left top, #ffffff 0%, var(--bg) 58%, #e8eef9 100%);
    }
    .wrap {
      min-height: 100vh;
      padding: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(18, 38, 63, 0.08);
      overflow: hidden;
    }
    .hd {
      margin: 0;
      padding: 12px 14px;
      font-size: 18px;
      border-bottom: 1px solid var(--line);
      background: #f8fbff;
    }
    .tip {
      padding: 8px 14px;
      border-bottom: 1px solid var(--line);
      color: var(--sub);
      font-size: 12px;
      line-height: 1.55;
      background: #fcfdff;
    }
    .view {
      padding: 10px 12px 14px;
      overflow: auto;
    }
    .l4-panel {
      border-top: 1px solid var(--line);
      background: #fbfdff;
      padding: 10px 14px 14px;
    }
    .l4-title {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #2a4160;
    }
    .l4-empty {
      margin: 0;
      font-size: 12px;
      color: #677a93;
    }
    .l4-list {
      margin: 0;
      padding-left: 18px;
      max-height: 320px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.55;
      color: #2a3f5d;
    }
    .l4-list li { margin: 2px 0; }
    .full-svg {
      display: block;
      width: 100%;
      height: auto;
      background: #ffffff;
      border: 1px solid #e2e8f2;
      border-radius: 10px;
    }
    .full-col-title {
      font-size: 12px;
      fill: #4b617f;
      font-weight: 700;
    }
    .full-node {
      fill: #f7faff;
      stroke: #b8c7de;
      stroke-width: 1;
      rx: 6;
      ry: 6;
      cursor: pointer;
      transition: opacity .15s ease, fill .15s ease, stroke .15s ease;
    }
    .full-edge {
      stroke: #8ca3c4;
      stroke-width: 1.1;
      fill: none;
      opacity: 0.8;
      cursor: pointer;
      transition: opacity .15s ease, stroke .15s ease, stroke-width .15s ease;
    }
    .full-text {
      font-size: 11px;
      fill: #1f3553;
      dominant-baseline: middle;
      pointer-events: none;
    }
    .full-active-node {
      stroke-width: 1.8;
      opacity: 1 !important;
    }
    .full-active-edge {
      stroke-width: 1.8;
      opacity: 1 !important;
    }
    .full-dim {
      opacity: 0.12 !important;
    }
  </style>
</head>

function uniqBy(items, keyFn) {
      const map = new Map();
      items.forEach(i => map.set(keyFn(i), i));
      return Array.from(map.values());
    }

    function toState(seed) {
      const s = {
        nodes: { L1: {}, L2: {}, L3: {}, L4: {} },
        hierarchy: [],
        edges: [],
        l3ToL4: {}
      };
      seed.l1.forEach(([id, name]) => s.nodes.L1[id] = name);
      seed.l2.forEach(([id, name]) => s.nodes.L2[id] = name);
      seed.l3.forEach(([id, name]) => s.nodes.L3[id] = name);
      seed.hierarchy.forEach(([l1, l2, l3]) => s.hierarchy.push({ l1, l2, l3 }));
      const actionToL4Id = {};
      let idx = 1;
      Object.keys(seed.l3Actions).forEach(l3 => {
        s.l3ToL4[l3] = s.l3ToL4[l3] || [];
        seed.l3Actions[l3].forEach(action => {
          if (!actionToL4Id[action]) {
            const id = 'L4_' + String(idx).padStart(3, '0');
            actionToL4Id[action] = id;
            s.nodes.L4[id] = action;
            idx += 1;
          }
          s.l3ToL4[l3].push(actionToL4Id[action]);
        });
      });
      return s;
    }

    function renderFullRelationGraph(s) {
      const l1Ids = Object.keys(s.nodes.L1).sort();
      const l2Ids = Object.keys(s.nodes.L2).sort();
      const l3Ids = Object.keys(s.nodes.L3).sort();

      const e12 = uniqBy(s.hierarchy.map(h => ({ fromL: 'L1', from: h.l1, toL: 'L2', to: h.l2 })), e => `${e.from}|${e.to}`);
      const e23 = uniqBy(s.hierarchy.map(h => ({ fromL: 'L2', from: h.l2, toL: 'L3', to: h.l3 })), e => `${e.from}|${e.to}`);
      const allEdges = [...e12, ...e23];

      const nodeW = 290;
      const nodeH = 24;
      const gapY = 8;
      const topPad = 36;
      const sidePad = 18;
      const colGap = 72;

      const maxCount = Math.max(l1Ids.length, l2Ids.length, l3Ids.length);
      const svgH = topPad + 18 + maxCount * nodeH + Math.max(0, maxCount - 1) * gapY + 20;

      const xL1 = sidePad;
      const xL2 = xL1 + nodeW + colGap;
      const xL3 = xL2 + nodeW + colGap;
      const svgW = xL3 + nodeW + sidePad;

      const yOf = (idx) => topPad + idx * (nodeH + gapY);
      const pos = { L1: {}, L2: {}, L3: {} };
      l1Ids.forEach((id, i) => { pos.L1[id] = { x: xL1, y: yOf(i) }; });
      l2Ids.forEach((id, i) => { pos.L2[id] = { x: xL2, y: yOf(i) }; });
      l3Ids.forEach((id, i) => { pos.L3[id] = { x: xL3, y: yOf(i) }; });

      const keyNode = (l, id) => `${l}:${id}`;
      const neighbors = {};
      allEdges.forEach(e => {
        const a = keyNode(e.fromL, e.from);
        const b = keyNode(e.toL, e.to);
        neighbors[a] = neighbors[a] || new Set();
        neighbors[b] = neighbors[b] || new Set();
        neighbors[a].add(b);
        neighbors[b].add(a);
      });

      const activeNode = (l, id) => {
        if (!fullRelationFocus) return true;
        if (fullRelationFocus.type === 'node') {
          const k = keyNode(l, id);
          const fk = keyNode(fullRelationFocus.level, fullRelationFocus.id);
          if (k === fk) return true;
          return neighbors[fk]?.has(k) || false;
        }
        if (fullRelationFocus.type === 'edge') {
          return (l === fullRelationFocus.fromL && id === fullRelationFocus.from) ||
                 (l === fullRelationFocus.toL && id === fullRelationFocus.to);
        }
        return true;
      };

      const activeEdge = (e) => {
        if (!fullRelationFocus) return true;
        if (fullRelationFocus.type === 'node') {
          return (e.fromL === fullRelationFocus.level && e.from === fullRelationFocus.id) ||
                 (e.toL === fullRelationFocus.level && e.to === fullRelationFocus.id);
        }
        if (fullRelationFocus.type === 'edge') {
          return e.fromL === fullRelationFocus.fromL && e.from === fullRelationFocus.from &&
                 e.toL === fullRelationFocus.toL && e.to === fullRelationFocus.to;
        }
        return true;
      };

      const nodeLabel = (level, id) => `${id} ${s.nodes[level][id] || '(未命名)'}`;
      const colTitle = (x, t) => `<text class="full-col-title" x="${x}" y="20">${esc(t)}</text>`;

      const drawNodes = (level, ids, x) => ids.map(id => {
        const p = pos[level][id];
        const on = activeNode(level, id);
        const cls = `full-node${fullRelationFocus ? (on ? ' full-active-node' : ' full-dim') : ''}`;
        const c = level === 'L2'
          ? (l2Morandi[id] || { fill: '#f7faff', stroke: '#b8c7de' })
          : { fill: '#f7faff', stroke: '#b8c7de' };
        const style = `fill:${c.fill};stroke:${c.stroke};`;
        return `<g>
          <rect class="${cls}" style="${style}" data-kind="full-node" data-level="${level}" data-id="${esc(id)}" x="${x}" y="${p.y}" width="${nodeW}" height="${nodeH}"></rect>
          <text class="full-text" x="${x + 8}" y="${p.y + nodeH / 2}">${esc(nodeLabel(level, id))}</text>
        </g>`;
      }).join('');

      const drawEdges = allEdges.map(e => {
        const p1 = pos[e.fromL][e.from];
        const p2 = pos[e.toL][e.to];
        const x1 = p1.x + nodeW;
        const y1 = p1.y + nodeH / 2;
        const x2 = p2.x;
        const y2 = p2.y + nodeH / 2;
        const cx1 = x1 + 28;
        const cx2 = x2 - 28;
        const ae = activeEdge(e);
        const cls = `full-edge${fullRelationFocus ? (ae ? ' full-active-edge' : ' full-dim') : ''}`;
        const l2id = e.fromL === 'L2' ? e.from : e.to;
        const c = l2Morandi[l2id]?.line || '#8ca3c4';
        return `<path class="${cls}" style="stroke:${c};" data-kind="full-edge" data-l2="${esc(l2id)}" data-froml="${e.fromL}" data-from="${esc(e.from)}" data-tol="${e.toL}" data-to="${esc(e.to)}" d="M ${x1} ${y1} C ${cx1} ${y1}, ${cx2} ${y2}, ${x2} ${y2}" />`;
      }).join('');

      return `
        <svg class="full-svg" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="L1 to L3 full relation graph">
          ${colTitle(xL1, 'L1')}
          ${colTitle(xL2, 'L2')}
          ${colTitle(xL3, 'L3')}
          ${drawEdges}
          ${drawNodes('L1', l1Ids, xL1)}
          ${drawNodes('L2', l2Ids, xL2)}
          ${drawNodes('L3', l3Ids, xL3)}
        </svg>
      `;
    }

    function renderL4Panel(s) {
      if (!selectedL3 || !s.nodes.L3[selectedL3]) {
        l4PanelTitle.textContent = 'L4 明细';
        l4PanelBody.innerHTML = '<p class="l4-empty">请点击图中的 L3 节点查看对应的 L4 动作。</p>';
        return;
      }
      const l3Name = s.nodes.L3[selectedL3];
      const l4Ids = Array.from(new Set(s.l3ToL4[selectedL3] || [])).sort();
      l4PanelTitle.textContent = `${selectedL3} ${l3Name} 对应的 L4（${l4Ids.length}）`;
      if (!l4Ids.length) {
        l4PanelBody.innerHTML = '<p class="l4-empty">该 L3 暂无关联 L4。</p>';
        return;
      }
      const items = l4Ids.map(id => {
        const zh = s.nodes.L4[id] || '(未命名)';
        const en = l4EnglishMapByZh[zh] || 'unknown';
        return `<li>${esc(id)} | ${esc(zh)} | ${esc(en)}</li>`;
      }).join('');
      l4PanelBody.innerHTML = `<ol class="l4-list">${items}</ol>`;
    }

    function rerender() {
      fullRelationView.innerHTML = renderFullRelationGraph(state);
      renderL4Panel(state);
    }

    fullRelationView.addEventListener('click', (ev) => {
      const t = ev.target;
      const kind = t?.dataset?.kind;
      if (!kind) {
        fullRelationFocus = null;
        rerender();
        return;
      }
      if (kind === 'full-node') {
        const level = t.dataset.level;
        const id = t.dataset.id;
        if (level === 'L3') selectedL3 = id;
        fullRelationFocus = fullRelationFocus && fullRelationFocus.type === 'node' &&
          fullRelationFocus.level === level && fullRelationFocus.id === id
          ? null : { type: 'node', level, id };
      } else if (kind === 'full-edge') {
        const fromL = t.dataset.froml;
        const from = t.dataset.from;
        const toL = t.dataset.tol;
        const to = t.dataset.to;
        fullRelationFocus = fullRelationFocus && fullRelationFocus.type === 'edge' &&
          fullRelationFocus.fromL === fromL && fullRelationFocus.from === from &&
          fullRelationFocus.toL === toL && fullRelationFocus.to === to
          ? null : { type: 'edge', fromL, from, toL, to };
      } else {
        fullRelationFocus = null;
      }
      rerender();
    });

    rerender();
  </script>
</body>
</html>
